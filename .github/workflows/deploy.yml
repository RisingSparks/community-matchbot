name: deploy-over-ssh

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_PATH: /home/${{ secrets.DEPLOY_USER }}/burning-man-matchbot
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add known_hosts entry
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ vars.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts

      - name: Verify remote deploy path access
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euxo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            PARENT_DIR="$(dirname "$DEPLOY_PATH")"

            whoami
            id
            pwd
            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "PARENT_DIR=$PARENT_DIR"

            ls -ld "$PARENT_DIR"
            if [ -e "$DEPLOY_PATH" ]; then
              ls -ld "$DEPLOY_PATH"
            else
              echo "Deploy path does not exist yet."
            fi

            mkdir -p "$DEPLOY_PATH"
            test -w "$DEPLOY_PATH"
          EOF

      - name: Sync repository
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "node_modules" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".env" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}"

      - name: Deploy on host
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            if [ -f docker-compose.yml ] || [ -f compose.yml ]; then
              docker compose up -d --build --remove-orphans
            else
              echo "No docker compose file found; provide project-specific deploy command."
              exit 1
            fi
          EOF

      - name: Smoke test
        if: ${{ vars.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --silent --show-error --location "${{ vars.DEPLOY_HEALTHCHECK_URL }}"
