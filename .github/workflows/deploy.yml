name: deploy-over-ssh

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add known_hosts entry
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify remote deploy path access
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euxo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            PARENT_DIR="$(dirname "$DEPLOY_PATH")"

            whoami
            id
            pwd
            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "PARENT_DIR=$PARENT_DIR"

            ls -ld "$PARENT_DIR"
            if [ -e "$DEPLOY_PATH" ]; then
              ls -ld "$DEPLOY_PATH"
            else
              echo "Deploy path does not exist yet."
            fi

            mkdir -p "$DEPLOY_PATH"
            test -w "$DEPLOY_PATH"
          EOF

      - name: Sync repository
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            --exclude ".git" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}"

      - name: Deploy on host
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH }}"
            if [ -f docker-compose.yml ] || [ -f compose.yml ]; then
              docker compose pull
              docker compose up -d --remove-orphans
            else
              echo "No docker compose file found; provide project-specific deploy command."
              exit 1
            fi
          EOF
