name: deploy-over-ssh

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_PATH: /home/${{ secrets.DEPLOY_USER }}/burning-man-matchbot
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add known_hosts entry
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify remote deploy path access
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euxo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            PARENT_DIR="$(dirname "$DEPLOY_PATH")"

            whoami
            id
            pwd
            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "PARENT_DIR=$PARENT_DIR"

            ls -ld "$PARENT_DIR"
            if [ -e "$DEPLOY_PATH" ]; then
              ls -ld "$DEPLOY_PATH"
            else
              echo "Deploy path does not exist yet."
            fi

            mkdir -p "$DEPLOY_PATH"
            test -w "$DEPLOY_PATH"
          EOF

      - name: Generate deploy env file
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_SERVICE_TIER: ${{ vars.OPENAI_SERVICE_TIER }}
          LLM_EXTRACTION_CONFIDENCE_THRESHOLD: ${{ vars.LLM_EXTRACTION_CONFIDENCE_THRESHOLD }}
          MATCHING_MIN_SCORE: ${{ vars.MATCHING_MIN_SCORE }}
          MATCHING_LLM_TRIAGE_BAND_LOW: ${{ vars.MATCHING_LLM_TRIAGE_BAND_LOW }}
          MATCHING_LLM_TRIAGE_BAND_HIGH: ${{ vars.MATCHING_LLM_TRIAGE_BAND_HIGH }}
          REDDIT_ENABLED: ${{ vars.REDDIT_ENABLED }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ vars.REDDIT_USER_AGENT }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_JSON_ENABLED: ${{ vars.REDDIT_JSON_ENABLED }}
          REDDIT_JSON_POLL_INTERVAL_SECONDS: ${{ vars.REDDIT_JSON_POLL_INTERVAL_SECONDS }}
          REDDIT_JSON_FETCH_LIMIT: ${{ vars.REDDIT_JSON_FETCH_LIMIT }}
          REDDIT_JSON_USER_AGENT: ${{ vars.REDDIT_JSON_USER_AGENT }}
          DISCORD_ENABLED: ${{ vars.DISCORD_ENABLED }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MODERATOR_CHANNEL_ID: ${{ vars.DISCORD_MODERATOR_CHANNEL_ID }}
          FACEBOOK_ENABLED: ${{ vars.FACEBOOK_ENABLED }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_VERIFY_TOKEN: ${{ secrets.FACEBOOK_VERIFY_TOKEN }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          VERBOSE: ${{ vars.VERBOSE }}
          DATABASE_BACKEND: ${{ vars.DATABASE_BACKEND }}
          DB_PATH: ${{ vars.DB_PATH }}
          REPORT_OUTPUT_DIR: ${{ vars.REPORT_OUTPUT_DIR }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          MODERATOR_NAME: ${{ vars.MODERATOR_NAME }}
          MOD_PASSWORD: ${{ secrets.MOD_PASSWORD }}
          MOD_SECRET_KEY: ${{ secrets.MOD_SECRET_KEY }}
          WWW_GUIDE_URL: ${{ vars.WWW_GUIDE_URL }}
          WWW_GUIDE_YEAR: ${{ vars.WWW_GUIDE_YEAR }}
          COMMUNITY_FEEDBACK_EMAIL: ${{ vars.COMMUNITY_FEEDBACK_EMAIL }}
          COMMUNITY_FEEDBACK_URL: ${{ vars.COMMUNITY_FEEDBACK_URL }}
        run: |
          set -euo pipefail
          umask 177
          : > .env

          write_env() {
            local key="$1"
            local value="$2"
            [ -z "$value" ] && return
            local escaped
            escaped=$(printf '%s' "$value" | sed "s/'/'\\\\''/g")
            printf "%s='%s'\n" "$key" "$escaped" >> .env
          }

          write_env LLM_PROVIDER "$LLM_PROVIDER"
          write_env ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"
          write_env ANTHROPIC_MODEL "$ANTHROPIC_MODEL"
          write_env OPENAI_API_KEY "$OPENAI_API_KEY"
          write_env OPENAI_MODEL "$OPENAI_MODEL"
          write_env OPENAI_SERVICE_TIER "$OPENAI_SERVICE_TIER"
          write_env LLM_EXTRACTION_CONFIDENCE_THRESHOLD "$LLM_EXTRACTION_CONFIDENCE_THRESHOLD"
          write_env MATCHING_MIN_SCORE "$MATCHING_MIN_SCORE"
          write_env MATCHING_LLM_TRIAGE_BAND_LOW "$MATCHING_LLM_TRIAGE_BAND_LOW"
          write_env MATCHING_LLM_TRIAGE_BAND_HIGH "$MATCHING_LLM_TRIAGE_BAND_HIGH"
          write_env REDDIT_ENABLED "$REDDIT_ENABLED"
          write_env REDDIT_CLIENT_ID "$REDDIT_CLIENT_ID"
          write_env REDDIT_CLIENT_SECRET "$REDDIT_CLIENT_SECRET"
          write_env REDDIT_USER_AGENT "$REDDIT_USER_AGENT"
          write_env REDDIT_USERNAME "$REDDIT_USERNAME"
          write_env REDDIT_PASSWORD "$REDDIT_PASSWORD"
          write_env REDDIT_JSON_ENABLED "$REDDIT_JSON_ENABLED"
          write_env REDDIT_JSON_POLL_INTERVAL_SECONDS "$REDDIT_JSON_POLL_INTERVAL_SECONDS"
          write_env REDDIT_JSON_FETCH_LIMIT "$REDDIT_JSON_FETCH_LIMIT"
          write_env REDDIT_JSON_USER_AGENT "$REDDIT_JSON_USER_AGENT"
          write_env DISCORD_ENABLED "$DISCORD_ENABLED"
          write_env DISCORD_BOT_TOKEN "$DISCORD_BOT_TOKEN"
          write_env DISCORD_MODERATOR_CHANNEL_ID "$DISCORD_MODERATOR_CHANNEL_ID"
          write_env FACEBOOK_ENABLED "$FACEBOOK_ENABLED"
          write_env FACEBOOK_APP_ID "$FACEBOOK_APP_ID"
          write_env FACEBOOK_APP_SECRET "$FACEBOOK_APP_SECRET"
          write_env FACEBOOK_PAGE_ACCESS_TOKEN "$FACEBOOK_PAGE_ACCESS_TOKEN"
          write_env FACEBOOK_VERIFY_TOKEN "$FACEBOOK_VERIFY_TOKEN"
          write_env SERVER_HOST "$SERVER_HOST"
          write_env SERVER_PORT "$SERVER_PORT"
          write_env VERBOSE "$VERBOSE"
          write_env DATABASE_BACKEND "$DATABASE_BACKEND"
          write_env DB_PATH "$DB_PATH"
          write_env REPORT_OUTPUT_DIR "$REPORT_OUTPUT_DIR"
          write_env NEON_DATABASE_URL "$NEON_DATABASE_URL"
          write_env MODERATOR_NAME "$MODERATOR_NAME"
          write_env MOD_PASSWORD "$MOD_PASSWORD"
          write_env MOD_SECRET_KEY "$MOD_SECRET_KEY"
          write_env WWW_GUIDE_URL "$WWW_GUIDE_URL"
          write_env WWW_GUIDE_YEAR "$WWW_GUIDE_YEAR"
          write_env COMMUNITY_FEEDBACK_EMAIL "$COMMUNITY_FEEDBACK_EMAIL"
          write_env COMMUNITY_FEEDBACK_URL "$COMMUNITY_FEEDBACK_URL"

      - name: Sync repository
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "node_modules" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}"

      - name: Deploy on host
        run: |
          ssh -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            if [ -f docker-compose.yml ] || [ -f compose.yml ]; then
              docker compose up -d --build --remove-orphans
            else
              echo "No docker compose file found; provide project-specific deploy command."
              exit 1
            fi
          EOF

      - name: Smoke test
        if: ${{ vars.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --silent --show-error --location "${{ vars.DEPLOY_HEALTHCHECK_URL }}"
