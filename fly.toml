app = "burning-man-matchbot"
primary_region = "sjc"

[build]

[env]
  SERVER_HOST = "0.0.0.0"
  SERVER_PORT = "8080"
  DB_PATH = "/data/matchbot.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # CRITICAL: listeners must stay alive
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[mounts]
  source = "matchbot_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
