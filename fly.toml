app = "burning-man-matchbot"
primary_region = "iad"

[build]

[env]
  SERVER_HOST = "0.0.0.0"
  SERVER_PORT = "8080"
  DATABASE_BACKEND = "neon"
  LLM_PROVIDER = "openai"
  OPENAI_MODEL = "gpt-5-nano"
  OPENAI_SERVICE_TIER = "flex"
  ANTHROPIC_MODEL = "claude-haiku-4-5"
  MODERATOR_NAME = "Matchbot Mod"
  REDDIT_USER_AGENT = "matchbot/0.1 by u/your-reddit-username"
  REDDIT_ENABLED = "false"
  DISCORD_ENABLED = "false"
  FACEBOOK_ENABLED = "false"
  VERBOSE = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # CRITICAL: listeners must stay alive
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
